# PedagogyX local dev stack (RFC-0003). No GPU required for boilerplate.
name: pedagogyx-dev

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_USER: pedagogyx
      POSTGRES_PASSWORD: pedagogyx_dev
      POSTGRES_DB: pedagogyx
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./sql/002_chunks_metrics.sql:/docker-entrypoint-initdb.d/002_chunks_metrics.sql:ro
      - ./sql/003_dat_sessions.sql:/docker-entrypoint-initdb.d/003_dat_sessions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedagogyx -d pedagogyx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pedagogyx
      MINIO_ROOT_PASSWORD: pedagogyx_dev_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../services/api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://pedagogyx:pedagogyx_dev@postgres:5432/pedagogyx
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: pedagogyx
      MINIO_SECRET_KEY: pedagogyx_dev_minio
      MINIO_BUCKET: pedagogyx-uploads
      MINIO_SECURE: "false"
      API_KEY: "dev_api_key_placeholder"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-asr:
    build:
      context: ../services/worker-asr
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_QUEUE: jobs:asr
      JOB_QUEUE_METRICS: jobs:talk_ratio
      WORKER_MODE: stub
      DATABASE_URL: postgresql://pedagogyx:pedagogyx_dev@postgres:5432/pedagogyx
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: pedagogyx
      MINIO_SECRET_KEY: pedagogyx_dev_minio
      MINIO_BUCKET: pedagogyx-uploads
      MINIO_SECURE: "false"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      api:
        condition: service_started

  worker-metrics:
    build:
      context: ../services/worker-metrics
    environment:
      REDIS_URL: redis://redis:6379/0
      JOB_QUEUE: jobs:talk_ratio
      DATABASE_URL: postgresql://pedagogyx:pedagogyx_dev@postgres:5432/pedagogyx
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../services/web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
