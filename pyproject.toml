[tool.black]
line-length = 100
target-version = ["py312"]
include = "(services|tools|packages)/.*\\.py$"

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["benchmarks/.venv/**"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["services", "tools", "packages/capture-core/py"]

[tool.mypy]
ignore_missing_imports = true
mypy_path = "services/worker-asr:services/worker-metrics:services/worker-cv"
explicit_package_bases = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
