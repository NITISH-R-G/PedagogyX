[tool.black]
line-length = 100
target-version = ["py312"]
include = "(services|tools|packages)/.*\\.py$"

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["benchmarks/.venv/**"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["services", "tools", "packages/capture-core/py"]

[tool.mypy]
# Global type checking settings
strict = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "psycopg2.*",
    "botocore.*",
    "boto3.*",
    "pydantic_settings.*",
    "redis.*",
    "faster_whisper.*",
    "torch.*"
]
ignore_missing_imports = true
