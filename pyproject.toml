[tool.black]
line-length = 100
target-version = ["py312"]
include = "(services|tools|packages)/.*\\.py$"

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["benchmarks/.venv/**"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["services", "tools", "packages/capture-core/py"]

[tool.mypy]
ignore_missing_imports = true



namespace_packages = true
explicit_package_bases = true

exclude = [
    "services/worker-metrics/worker",
]
