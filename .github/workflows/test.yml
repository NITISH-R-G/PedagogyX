name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          cd services/api
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install safety pip-audit

      - name: Security & Dependency Audit
        run: |
          cd services/api
          source .venv/bin/activate
          safety check || echo "Safety checks completed (non-blocking for MVP)"
          pip-audit || echo "Audit completed (non-blocking for MVP)"

      - name: Run Backend Tests
        env:
          DATABASE_URL: "dev"
          REDIS_URL: "dev"
          API_KEY: "dev_api_key_placeholder"
          MINIO_ACCESS_KEY: "dev"
        run: |
          cd services/api
          source .venv/bin/activate
          pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Frontend Dependencies
        run: |
          cd services/web
          npm install --legacy-peer-deps

      - name: Run Frontend Tests
        run: |
          cd services/web
          npm test
