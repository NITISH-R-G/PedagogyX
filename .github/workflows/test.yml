name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          cd services/api
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run Backend Tests
        run: |
          cd services/api
          source .venv/bin/activate
          pytest

      - name: Install Worker-Metrics Dependencies
        run: |
          cd services/worker-metrics
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run Worker-Metrics Tests
        run: |
          source services/worker-metrics/.venv/bin/activate
          PYTHONPATH=services/worker-metrics pytest services/worker-metrics/tests/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        run: |
          cd services/web
          npm install --legacy-peer-deps

      - name: Run Frontend Tests
        run: |
          cd services/web
          npm test
