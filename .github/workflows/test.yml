name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          cd .
          python -m venv .venv
          source .venv/bin/activate
          pip install -r services/api/requirements.txt -r services/worker-asr/requirements.txt -r services/worker-metrics/requirements.txt  pytest pytest-asyncio
          pip install safety pip-audit

      - name: Security & Dependency Audit
        run: |
          cd .
          source .venv/bin/activate
          safety check || echo "Safety checks completed (non-blocking for MVP)"
          pip-audit || echo "Audit completed (non-blocking for MVP)"

      - name: Run Backend Tests
        env:
          DATABASE_URL: "dev"
          REDIS_URL: "dev"
          API_KEY: "dev_api_key_placeholder"
          MINIO_ACCESS_KEY: "dev"
        run: |
          cd .
          source .venv/bin/activate
          PYTHONPATH=services/api:services/worker-asr/worker:services/worker-metrics/worker:services/worker-cv/worker pytest services/api/tests/ services/worker-asr/tests/ services/worker-metrics/tests/ services/worker-cv/tests/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Frontend Dependencies
        run: |
          cd services/web
          npm install --legacy-peer-deps

      - name: Run Frontend Tests
        run: |
          cd services/web
          npm test
