name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pedagogyx
          POSTGRES_PASSWORD: pedagogyx_dev
          POSTGRES_DB: pedagogyx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r services/api/requirements.txt

      - name: Initialize Database
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=pedagogyx_dev psql -h localhost -U pedagogyx -d pedagogyx -f infra/sql/001_init.sql
          PGPASSWORD=pedagogyx_dev psql -h localhost -U pedagogyx -d pedagogyx -f infra/sql/002_chunks_metrics.sql
          PGPASSWORD=pedagogyx_dev psql -h localhost -U pedagogyx -d pedagogyx -f infra/sql/003_dat_sessions.sql

      - name: Run API Tests
        env:
          DATABASE_URL: postgresql://pedagogyx:pedagogyx_dev@localhost:5432/pedagogyx
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test_key
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testsecret
          MINIO_BUCKET: test-bucket
        run: |
          cd services/api
          PYTHONPATH=. pytest --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./services/api/coverage.xml
          fail_ci_if_error: false
