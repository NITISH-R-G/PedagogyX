name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/api/requirements.txt
        pip install -r services/worker-cv/requirements.txt
        pip install -r services/worker-asr/requirements.txt
        pip install -r services/worker-metrics/requirements.txt
    - name: Run Python tests
      env:
        PYTHONPATH: services/api:services/worker-cv:services/worker-asr:services/worker-metrics:packages/capture-core/py
        API_KEY: "dev_api_key_placeholder"
      run: |
        pytest services/api/tests/ services/worker-cv/tests/ services/worker-asr/tests/ services/worker-metrics/tests/ --cov=services --cov-report=xml
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: NITISH-R-G/PedagogyX

  test-node:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        cache: 'npm'
        cache-dependency-path: services/web/package-lock.json
    - name: Install dependencies
      run: npm ci --prefix services/web --legacy-peer-deps
    - name: Run Node tests
      run: npm run test --prefix services/web
