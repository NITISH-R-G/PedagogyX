name: DAT Session Smoke Tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose Stack
        run: docker compose -f infra/compose.dev.yaml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for API to be ready..."
          timeout 60 bash -c 'until curl -s http://localhost:8080/api/v1/health | grep "\"status\":\"healthy\""; do sleep 2; done'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install tools dependencies
        run: |
          cd tools/dat-session-sim
          pip install -r requirements.txt

      - name: Run DAT Session Simulation
        env:
          API_BASE_URL: http://localhost:8080
          API_KEY: dev_api_key_placeholder
        run: |
          cd tools/dat-session-sim
          python dat_session_cli.py run \
            --teacher test-teacher-1 \
            --school test-school \
            --room test-room \
            --duration 10 \
            --image-interval 2

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/compose.dev.yaml logs
