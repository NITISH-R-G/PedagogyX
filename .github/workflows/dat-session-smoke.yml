name: DAT Session Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Start Services
        run: docker compose -f infra/compose.dev.yaml up -d --build

      - name: Wait for API
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            curl -s http://localhost:8000/health && break
            sleep 2
          done

      - name: Run DAT Session Simulator
        run: |
          cd tools/dat-session-sim
          pip install -r requirements.txt
          python dat_session_cli.py run --verbose
