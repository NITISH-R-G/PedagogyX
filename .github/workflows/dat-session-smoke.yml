name: dat-session-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tools/dat-session-sim/**"
      - "services/api/**"
      - "services/worker-cv/**"
      - "services/worker-asr/**"
      - "services/worker-metrics/**"
      - "scripts/dat-session-smoke.sh"
      - "infra/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dat-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DAT Simulator Dependencies
        run: |
          cd tools/dat-session-sim
          pip install -r requirements.txt

      - name: DAT Simulator smoke test
        run: ./scripts/dat-session-smoke.sh
