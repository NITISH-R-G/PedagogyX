name: Comprehensive QA and Security System

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality_and_security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black radon vulture jscpd safety pip-audit
          pip install -r services/api/requirements.txt
          pip install -r scripts/automation/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          npm install -g eslint prettier typescript jscpd
          cd services/web && npm install --legacy-peer-deps

      - name: Run Formatting and Linting (Auto-Fix Allowed)
        continue-on-error: true
        run: |
          # Allow formatting to rewrite, fail if it still fails check, same for ruff
          black services tools packages scripts
          black --check services tools packages scripts
          ruff check services tools packages scripts --output-file ruff_report.txt

          cd services/web
          npx prettier --write .
          npx prettier --check . > ../../prettier_report.txt

      - name: Run Static Analysis (Type Checking, Complexity, Dead Code)
        continue-on-error: true
        run: |
          mypy services tools packages > mypy_report.txt
          radon cc services tools packages -s -a > radon_cc_report.txt
          radon mi services tools packages -s > radon_mi_report.txt
          vulture services tools packages > vulture_report.txt
          jscpd services packages tools --reporters console,json --output jscpd_report

      - name: Run Security and Dependency Audits
        continue-on-error: true
        run: |
          safety check -r services/api/requirements.txt > safety_report.txt
          pip-audit -r services/api/requirements.txt > pip_audit_report.txt
          cd services/web && npm audit --audit-level=high > ../../npm_audit_report.txt

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --outfile sbom.spdx.json --format json

      - name: Generate QA Metrics Report
        run: |
          python scripts/automation/repo_analyzer.py

      - name: Upload QA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            *_report.txt
            jscpd_report/
            docs/QA_REPORT.md
            radon_*.txt
            sbom.spdx.json
