name: Self-Maintaining Repo

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-format Code
        run: |
          npm install -g prettier
          pip install black ruff
          black services tools packages scripts || true
          ruff check --fix services tools packages scripts || true
          cd services/web && npx prettier --write . || true

      - name: Generate updated Documentation
        run: |
          ./scripts/generate-dashboard.sh || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: self-maintaining repo updates"
          title: "Automated Maintenance: Formatting and Docs"
          branch: "auto-maintenance"
          body: "This PR was generated automatically to format code and update documentation."
