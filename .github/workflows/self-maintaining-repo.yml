name: Self-Maintaining Repo

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy pytest
          pip install -r scripts/automation/requirements.txt
          pip install networkx

      - name: Generate Repo Knowledge Graph
        run: |
          python scripts/automation/repo_analyzer.py

      - name: Generate AI Architecture Docs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/automation/ai_doc_agent.py
          else
            echo "OPENAI_API_KEY not found, skipping AI generation. Using fallback diagrams."
            python scripts/automation/diagram_generator.py
          fi
          python scripts/automation/readme_generator.py

      - name: Generate Health Dashboard
        run: |
          python scripts/automation/generate_health_dashboard.py

      - name: Commit and Push Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update documentation and knowledge graph"
          branch: main
          file_pattern: 'README.md docs/* knowledge_graph.json'
