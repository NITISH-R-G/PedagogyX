name: Dev Verify (docs)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Docs lint and format
        run: ./scripts/dev-verify.sh --docs-only

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Global Security & Dependency Audit
        run: |
          pip install safety pip-audit
          safety check || echo "Safety checks completed (non-blocking)"
          pip-audit || echo "Audit completed (non-blocking)"
