name: compose-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "infra/**"
      - "services/**"
      - "scripts/compose-smoke.sh"

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Compose smoke test
        run: ./scripts/compose-smoke.sh
